version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:15-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=postgres
    volumes:
      - ./supabase/schema.sql:/schema/schema.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["psql -h db -U postgres -d postgres -f /schema/schema.sql"]
    restart: "no"

  pusher:
    build:
      context: ./rust/neo_log_pusher
    image: neo-log-pusher:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_DIR=/neo-data/logs
      - HTTP_PORT=8080
    volumes:
      - ./logs:/neo-data/logs
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./web/neo-debugger
    image: neo-debugger:latest
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_REFRESH_MS=${NEXT_PUBLIC_REFRESH_MS:-15000}
    ports:
      - "3000:3000"
    depends_on:
      - pusher
      - db
      - db-init
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  logs:
  pgdata:
